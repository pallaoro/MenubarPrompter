name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Build .app bundle
        run: ./Scripts/build-app.sh --version "${{ steps.version.outputs.version }}"

      - name: Zip the .app
        working-directory: dist
        run: ditto -c -k --keepParent "Menubar Prompter.app" "MenubarPrompter-${{ steps.version.outputs.version }}.zip"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/MenubarPrompter-${{ steps.version.outputs.version }}.zip
          generate_release_notes: true
          name: "v${{ steps.version.outputs.version }}"
          body: |
            ## Install

            1. Download `MenubarPrompter-${{ steps.version.outputs.version }}.zip` below.
            2. Unzip and drag **Menubar Prompter.app** into your `/Applications` folder.
            3. **First launch**: right-click the app → **Open** → confirm the Gatekeeper prompt. (The app is not signed by Apple yet, so macOS asks once.)

            That's it — the prompter docks under your menu bar.
